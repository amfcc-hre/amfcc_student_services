<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#173a63"><title>AMFCC Campus Dashboard</title><link rel="apple-touch-icon" href="icon.png"><style>
:root{--blue:#173a63;--bg:#edf1f5;--text:#17202a}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial;background:var(--bg);color:var(--text)}main{max-width:1180px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.top a{text-decoration:none;font-weight:800;color:var(--blue)}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}.card,.panel{background:#fff;border-radius:18px;padding:20px;box-shadow:0 8px 25px #18243614}.card{text-align:center}.card .n{font-size:44px;font-weight:900}.card .l{font-weight:800;color:#66727f}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.toolbar input,.toolbar select,.toolbar button{padding:12px;border:1px solid #ccd5df;border-radius:10px;background:#fff;font-size:16px}.toolbar input{flex:1;min-width:220px}.toolbar button{font-weight:800;color:#fff;background:var(--blue)}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:11px;border-bottom:1px solid #e6eaf0}th{font-size:12px;text-transform:uppercase;color:#66727f}.pill{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900}.IN{background:#e7f7ec;color:#0f6b39}.OUT{background:#fdeaea;color:#9a2020}.UNKNOWN{background:#eef1f5;color:#59636e}.tabs{display:flex;gap:8px;margin:18px 0}.tabs button{padding:11px 15px;border:0;border-radius:10px;font-weight:800}.tabs .active{background:var(--blue);color:#fff}.modal{position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;padding:20px}.modalbox{background:#fff;padding:24px;border-radius:18px;width:100%;max-width:390px;text-align:center}.modalbox input{font-size:28px;text-align:center;letter-spacing:10px;width:100%;padding:14px;border:2px solid #ccd5df;border-radius:12px}.modalbox button{width:100%;padding:14px;border:0;border-radius:12px;background:var(--blue);color:#fff;font-weight:900;margin-top:12px}.err{color:#b42318;font-weight:800;min-height:22px}.hidden{display:none}@media(max-width:700px){.cards{grid-template-columns:1fr}.panel{overflow:auto}.top h1{font-size:21px}}
</style></head><body><main><div class="top"><a href="index.html">← Home</a><h1>Campus Status Dashboard</h1><span id="updated">Not loaded</span></div><div class="cards"><div class="card"><div id="onCount" class="n">0</div><div class="l">On campus</div></div><div class="card"><div id="offCount" class="n">0</div><div class="l">Off campus</div></div><div class="card"><div id="unknownCount" class="n">0</div><div class="l">Unknown</div></div></div><div class="tabs"><button id="studentsTab" class="active">Student status</button><button id="recentTab">Recent movements</button></div><section id="studentsPanel" class="panel"><div class="toolbar"><input id="search" placeholder="Search student or registration number"><select id="statusFilter"><option value="ALL">All statuses</option><option value="IN">On campus</option><option value="OUT">Off campus</option><option value="UNKNOWN">Unknown</option></select><button id="refresh">Refresh</button></div><table><thead><tr><th>Student</th><th>Registration</th><th>Status</th><th>Last movement</th></tr></thead><tbody id="studentRows"></tbody></table></section><section id="recentPanel" class="panel hidden"><table><thead><tr><th>Time</th><th>Student</th><th>Registration</th><th>Movement</th><th>Gate</th></tr></thead><tbody id="recentRows"></tbody></table></section></main><div id="login" class="modal"><div class="modalbox"><img src="icon.png" width="70" style="border-radius:16px"><h2>Administrator or Student Leadership</h2><p>Enter the authorised dashboard PIN.</p><input id="pin" type="password" inputmode="numeric" maxlength="4"><div id="pinErr" class="err"></div><button id="loginBtn">Open dashboard</button></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="campus-dashboard.js"></script></body></html>
